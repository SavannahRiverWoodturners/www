name: Build and Deploy to Staging
run-name: "Deploy site-0.1.${{ github.run_number }} to staging"

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.157.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_PARAMS_SITEVERSION: "0.1.${{ github.run_number }}"
        run: hugo --minify --baseURL "https://savannahriverwoodturners.org/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-0.1.${{ github.run_number }}
          path: ./public
          retention-days: 30

      - name: Upload artifact (latest)
        uses: actions/upload-artifact@v4
        with:
          name: site-latest
          path: ./public
          retention-days: 30
          overwrite: true

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site-0.1.${{ github.run_number }}
          path: ./public

      - name: Deploy to staging (/www)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          target-folder: www
          clean: true
          clean-exclude: CNAME
          commit-message: "Deploy site-0.1.${{ github.run_number }} to staging"
