name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote to production (e.g. 0.1.42)"
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find artifact run ID
        id: find-run
        run: |
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
            --paginate \
            --jq '.artifacts[] | select(.name == "site-${{ inputs.version }}" and .expired == false) | .workflow_run.id' \
            | head -1)
          if [ -z "$RUN_ID" ]; then
            echo "::error::No unexpired artifact found for site-${{ inputs.version }}"
            exit 1
          fi
          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: site-${{ inputs.version }}
          run-id: ${{ steps.find-run.outputs.run-id }}
          github-token: ${{ github.token }}
          path: ./public

      - name: Deploy to production (root)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean: true
          clean-exclude: |
            www
            CNAME
