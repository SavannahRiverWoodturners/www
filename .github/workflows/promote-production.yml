name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote to production (e.g. 0.1.42)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: site-${{ inputs.version }}
          path: ./public

      - name: Deploy to production (root)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean: true
          clean-exclude: |
            www
            CNAME
