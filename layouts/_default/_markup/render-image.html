{{- $src := .Destination -}}
{{- if and (hasPrefix $src "/") (not (hasPrefix $src "//")) -}}
  {{- $abs := strings.TrimPrefix "/" $src | absURL -}}
  {{- $src = (urls.Parse $abs).Path -}}
{{- end -}}
{{- if .Title -}}
<figure class="post-figure">
  <img src="{{ $src }}" alt="{{ .Text | safeHTML }}">
  <figcaption>{{ .Title | safeHTML }}</figcaption>
</figure>
{{- else -}}
<img src="{{ $src }}" alt="{{ .Text | safeHTML }}">
{{- end -}}
