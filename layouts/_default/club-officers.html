{{ define "main" }}
  <div class="officers-photo-wrap">
    <img class="officers-photo" src="{{ "img/club-officers.jpg" | relURL }}" alt="Club Officers group photo">
  </div>

  {{ if site.Data.officers }}
  <div class="officers-grid">
    {{ range site.Data.officers }}
    <div class="officer-card">
      <div class="officer-card__role">{{ .role }}</div>
      <div class="officer-card__name">{{ .name }}</div>
    </div>
    {{ end }}
  </div>
  {{ end }}
{{ end }}
